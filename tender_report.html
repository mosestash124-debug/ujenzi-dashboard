<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ujenzi - Report Suspicious Tender</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0a0a0a; color: #fff; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.8rem; border-left: 4px solid #ff6600; padding-left: 16px; margin-bottom: 8px; }
        .sub { color: #888; font-size: 0.9rem; margin-bottom: 24px; padding-left: 20px; }
        .nav { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .nav a { color: #ff4444; text-decoration: none; font-size: 0.9rem; padding: 8px 0; }
        .form-card { background: #111; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #ccc; }
        input, textarea, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; font-size: 1rem; font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; }
        button { background: #ff6600; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; }
        button:active { transform: scale(0.98); }
        .success { background: #00aa44; padding: 12px; border-radius: 10px; margin-top: 16px; text-align: center; }
        .error { background: #ff0000; padding: 12px; border-radius: 10px; margin-top: 16px; text-align: center; }
        .footer { text-align: center; color: #555; font-size: 0.7rem; margin-top: 30px; padding-top: 16px; border-top: 1px solid #222; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏷️ UJENZI - LPT</h1>
    <div class="sub">Local Purchase Tracker – Report Suspicious Government Tenders</div>
    <div class="nav">
        <a href="dashboard.html">🏗️ Stalled</a>
        <a href="bailout.html">💰 Debt</a>
        <a href="report.html">📱 Report Site</a>
        <a href="tender_report.html" style="color:#ff6600;">🏷️ Report Tender</a>
        <a href="tenders_view.html">📋 View Tenders</a>
    </div>
    <div class="form-card">
        <div class="form-group">
            <label>🏛️ Government Ministry / Department *</label>
            <input type="text" id="ministry" placeholder="e.g., Ministry of Health">
        </div>
        <div class="form-group">
            <label>📄 Tender Description *</label>
            <textarea id="description" placeholder="What was being procured?"></textarea>
        </div>
        <div class="form-group">
            <label>💰 Tender Value (KES)</label>
            <input type="text" id="value" placeholder="e.g., 50,000,000">
        </div>
        <div class="form-group">
            <label>🏢 Company Awarded *</label>
            <input type="text" id="company" placeholder="Name of the company that won">
        </div>
        <div class="form-group">
            <label>👤 Company Owner / Director (if known)</label>
            <input type="text" id="owner" placeholder="Optional">
        </div>
        <div class="form-group">
            <label>⚠️ Suspicion Reason</label>
            <select id="risk">
                <option value="Shell company">Shell company (no physical office)</option>
                <option value="Connected to politician">Owner connected to politician</option>
                <option value="Repeated winner">Same company wins repeatedly</option>
                <option value="Overpriced">Likely overpriced</option>
                <option value="Youth/women fraud">Claimed youth/women but not</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>📅 Tender Year</label>
            <input type="text" id="year" placeholder="e.g., 2025">
        </div>
        <button onclick="submitTender()">🚨 SUBMIT TENDER REPORT</button>
        <div id="result"></div>
    </div>
    <div class="footer">
        Your report helps expose tender rigging and fake youth/women enterprises.<br>
        All reports are public and can be verified.
    </div>
</div>

<script>
    function submitTender() {
        const ministry = document.getElementById('ministry').value.trim();
        const description = document.getElementById('description').value.trim();
        const value = document.getElementById('value').value.trim();
        const company = document.getElementById('company').value.trim();
        const owner = document.getElementById('owner').value.trim();
        const risk = document.getElementById('risk').value;
        const year = document.getElementById('year').value.trim();

        if (!ministry || !description || !company) {
            showResult('Please fill Ministry, Description, and Company fields', 'error');
            return;
        }

        const report = {
            id: Date.now(),
            ministry: ministry,
            description: description,
            value: value || 'Unknown',
            company: company,
            owner: owner || 'Not provided',
            risk: risk,
            year: year || 'Unknown',
            date: new Date().toISOString()
        };

        let reports = JSON.parse(localStorage.getItem('ujenzi_tenders') || '[]');
        reports.push(report);
        localStorage.setItem('ujenzi_tenders', JSON.stringify(reports));

        showResult('✅ Tender reported successfully!', 'success');

        // Clear form
        setTimeout(() => {
            document.getElementById('ministry').value = '';
            document.getElementById('description').value = '';
            document.getElementById('value').value = '';
            document.getElementById('company').value = '';
            document.getElementById('owner').value = '';
            document.getElementById('risk').value = 'Shell company';
            document.getElementById('year').value = '';
        }, 2000);
    }

    function showResult(msg, type) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => resultDiv.innerHTML = '', 5000);
    }
</script>
</body>
</html>
