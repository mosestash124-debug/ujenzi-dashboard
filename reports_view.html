<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujenzi - Citizen Reports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2rem; border-left: 5px solid #ff0000; padding-left: 20px; margin-bottom: 10px; }
        .nav { display: flex; gap: 20px; margin-bottom: 30px; padding-left: 25px; flex-wrap: wrap; }
        .nav a { color: #ff4444; text-decoration: none; font-weight: bold; }
        .report-card { background: #111; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #ff0000; }
        .report-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .report-details { display: flex; gap: 15px; flex-wrap: wrap; margin: 10px 0; }
        .detail { background: #1a1a1a; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .report-description { color: #ccc; margin: 10px 0; line-height: 1.4; }
        .report-photo { margin-top: 10px; }
        .report-photo img { max-width: 200px; border-radius: 8px; }
        .satellite-link { color: #00aa44; text-decoration: none; margin-top: 10px; display: inline-block; }
        .footer { margin-top: 40px; text-align: center; color: #555; font-size: 0.8rem; border-top: 1px solid #222; padding-top: 20px; }
        .empty { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>?? UJENZI - CITIZEN REPORTS</h1>
        <div class="nav">
            <a href="dashboard.html">??? Stalled Projects</a>
            <a href="bailout.html">?? Bailout Watch</a>
            <a href="report.html">?? Report</a>
            <a href="reports_view.html">?? Reports</a>
        </div>
        <div id="reportsList" class="reports-list">Loading...</div>
        <div class="footer">Citizen-submitted evidence of stalled government projects</div>
    </div>
    <script>
        function loadReports() {
            var reports = JSON.parse(localStorage.getItem('ujenzi_reports') || '[]');
            var container = document.getElementById('reportsList');
            if (reports.length === 0) {
                container.innerHTML = '<div class="empty">?? No citizen reports yet. Be the first to report a stalled project!</div>';
                return;
            }
            var html = '';
            for (var i = reports.length - 1; i >= 0; i--) {
                var r = reports[i];
                html += '<div class="report-card">';
                html += '<div class="report-name">?? ' + escapeHtml(r.name) + '</div>';
                html += '<div class="report-details">';
                html += '<span class="detail">?? ' + escapeHtml(r.ministry) + '</span>';
                html += '<span class="detail">?? ' + escapeHtml(r.status) + '</span>';
                html += '<span class="detail">?? ' + escapeHtml(r.budget) + '</span>';
                html += '<span class="detail">?? ' + new Date(r.date).toLocaleDateString() + '</span>';
                html += '</div>';
                html += '<div class="report-description">?? ' + escapeHtml(r.description) + '</div>';
                if (r.lat && r.lng) {
                    html += '<a href="https://www.google.com/maps?q=' + r.lat + ',' + r.lng + '&layer=satellite" target="_blank" class="satellite-link">??? Verify via Satellite</a>';
                }
                if (r.photo) {
                    html += '<div class="report-photo"><img src="' + r.photo + '" alt="Evidence"></div>';
                }
                html += '</div>';
            }
            container.innerHTML = html;
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        loadReports();
    </script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    reg.update();
    reg.addEventListener('updatefound', function() {
      var newWorker = reg.installing;
      newWorker.addEventListener('statechange', function() {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          if (confirm('A new version of Ujenzi is available. Refresh to update?')) {
            window.location.reload();
          }
        }
      });
    });
  });
}
</script><script>
// Check for service worker updates every time user opens the app
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    // Check for updates every time the page loads
    reg.update();
    
    // Optional: notify user when an update is ready
    reg.addEventListener('updatefound', function() {
      var newWorker = reg.installing;
      newWorker.addEventListener('statechange', function() {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // New version available, refresh to apply
          if (confirm('A new version of Ujenzi is available. Refresh to update?')) {
            window.location.reload();
          }
        }
      });
    });
  });
}
</script>
</body>
</html>
