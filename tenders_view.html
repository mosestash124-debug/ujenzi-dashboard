<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujenzi - Local Purchase Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2rem; border-left: 5px solid #ff6600; padding-left: 20px; margin-bottom: 10px; }
        .nav { display: flex; gap: 20px; margin-bottom: 30px; padding-left: 25px; flex-wrap: wrap; }
        .nav a { color: #ff4444; text-decoration: none; font-weight: bold; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: #111; border-radius: 12px; padding: 20px; flex: 1; min-width: 150px; border-left: 4px solid #ff6600; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #ffaa44; }
        .tender-card { background: #111; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #ff6600; }
        .tender-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .tender-company { font-size: 1.2rem; font-weight: bold; color: #ffaa44; }
        .risk-badge { background: #ff0000; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .risk-badge.low { background: #00aa44; }
        .risk-badge.medium { background: #ffaa00; color: #111; }
        .tender-details { display: flex; gap: 15px; flex-wrap: wrap; margin: 10px 0; }
        .detail { background: #1a1a1a; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; color: #ccc; }
        .footer { margin-top: 40px; text-align: center; color: #555; font-size: 0.8rem; border-top: 1px solid #222; padding-top: 20px; }
        .empty { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏷️ UJENZI - LPT</h1>
    <div class="sub">Local Purchase Tracker – Government Tender Integrity Monitor</div>
    <div class="nav">
        <a href="dashboard.html">🏗️ Stalled</a>
        <a href="bailout.html">💰 Debt</a>
        <a href="report.html">📱 Report Site</a>
        <a href="tender_report.html">🏷️ Report Tender</a>
        <a href="tenders_view.html" style="color:#ff6600;">📋 View Tenders</a>
    </div>
    <div class="stats" id="stats"></div>
    <div id="tendersList"></div>
    <div class="footer">Reported suspicious tenders. Red badges indicate high risk. Help verify youth/women enterprises.</div>
</div>

<script>
    function loadTenders() {
        const tenders = JSON.parse(localStorage.getItem('ujenzi_tenders') || '[]');
        const statsDiv = document.getElementById('stats');
        const container = document.getElementById('tendersList');

        const total = tenders.length;
        const highRisk = tenders.filter(t => t.risk !== 'Youth/women fraud' && t.risk !== 'Overpriced').length; // simplified

        statsDiv.innerHTML = `
            <div class="stat-card"><div class="stat-number">${total}</div><div>Total Reports</div></div>
            <div class="stat-card"><div class="stat-number">${highRisk}</div><div>High Risk</div></div>
        `;

        if (tenders.length === 0) {
            container.innerHTML = '<div class="empty">📭 No tender reports yet. Be the first to report a suspicious tender.</div>';
            return;
        }

        tenders.reverse().forEach(t => {
            let riskClass = 'risk-badge';
            if (t.risk === 'Youth/women fraud') riskClass += ' medium';
            else if (t.risk === 'Shell company' || t.risk === 'Connected to politician') riskClass += ' high';
            else riskClass += ' low';

            const card = document.createElement('div');
            card.className = 'tender-card';
            card.innerHTML = `
                <div class="tender-header">
                    <span class="tender-company">🏢 ${escapeHtml(t.company)}</span>
                    <span class="${riskClass}">⚠️ ${escapeHtml(t.risk)}</span>
                </div>
                <div class="tender-details">
                    <span class="detail">🏛️ ${escapeHtml(t.ministry)}</span>
                    <span class="detail">💰 KES ${escapeHtml(t.value)}</span>
                    <span class="detail">📅 ${escapeHtml(t.year)}</span>
                    <span class="detail">👤 Owner: ${escapeHtml(t.owner)}</span>
                </div>
                <div style="margin-top: 10px;">📝 ${escapeHtml(t.description)}</div>
                <div style="font-size: 0.7rem; color: #555; margin-top: 8px;">Reported: ${new Date(t.date).toLocaleDateString()}</div>
            `;
            container.appendChild(card);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadTenders();
</script>
</body>
</html>
